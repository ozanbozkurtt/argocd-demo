apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: common-infra-bases
  namespace: argocd
spec:
  generators:
  - git:
      repoURL: 'https://github.com/ozanbozkurtt/argocd-demo.git'
      revision: HEAD
      directories:
      - path: infra/bases/*
  template:
    metadata:
      name: '{{path[2]}}-base'
    spec:
      project: default
      source:
        repoURL: 'https://github.com/ozanbozkurtt/argocd-demo.git'
        targetRevision: HEAD
        path: '{{path}}'
        kustomize: {}
      destination:
        server: 'https://kubernetes.default.svc'
        namespace: '{{path[2]}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
