apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: common-app-bases
  namespace: argocd
spec:
  generators:
  - git:
      repoURL: 'https://github.com/ozanbozkurtt/argocd-demo.git'
      revision: HEAD
      directories:
      - path: apps/*/base
  template:
    metadata:
      name: '{{path[1]}}-base'
    spec:
      project: default
      source:
        repoURL: 'https://github.com/ozanbozkurtt/argocd-demo.git'
        targetRevision: HEAD
        path: '{{path}}'
        kustomize: {}
      destination:
        server: 'https://kubernetes.default.svc'
        namespace: '{{path[1]}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
          - FailOnSharedResource=false
