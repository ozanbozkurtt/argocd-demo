apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-prod-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/KULLANICI_ADI/argocd-demo.git' # Kendi Git reponuzla güncelleyin
    targetRevision: HEAD
    path: apps/nginx-app/overlays/prod
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    createNamespace: true
