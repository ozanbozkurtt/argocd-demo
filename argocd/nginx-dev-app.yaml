apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-dev-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/KULLANICI_ADI/argocd-demo.git' # Kendi Git reponuzla güncelleyin
    targetRevision: HEAD
    path: apps/nginx-app/overlays/dev
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    createNamespace: true
