apiVersion: apps/v1
kind: Deployment
metadata:
  name: x509-certificate-exporter
spec:
  template:
    spec:
      containers:
      - name: exporter
        args:
        - --watch-kube-secrets=true
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: k3s-tls
          mountPath: /var/lib/rancher/k3s/server/tls
          readOnly: true
      volumes:
      - name: k3s-tls
        hostPath:
          path: /var/lib/rancher/k3s/server/tls
          type: Directory
