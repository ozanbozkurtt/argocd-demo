global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: demo-cluster

scrape_configs:
  - job_name: 'prometheus-agent'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'kube-state-metrics'
    static_configs:
      - targets: ['kube-state-metrics.monitoring.svc.cluster.local:8080']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter-prometheus-node-exporter.monitoring.svc.cluster.local:9100']

  - job_name: 'argocd-metrics'
    static_configs:
      - targets: ['argocd-application-controller-metrics.argocd.svc.cluster.local:8082']

  - job_name: 'argocd-server-metrics'
    static_configs:
      - targets: ['argocd-server-metrics.argocd.svc.cluster.local:8083']

  - job_name: 'x509-certificate-exporter'
    static_configs:
      - targets:
        - 'x509-certificate-exporter.monitoring.svc.cluster.local:9793'
        - 'x509-k3s-tls-exporter.monitoring.svc.cluster.local:9793'

  # NOTE: job relabeled to 'kubelet' + metrics_path label added so the
  # kubernetes-mixin recording rules (which filter job="kubelet",
  # metrics_path="/metrics/cadvisor") match these series.
  - job_name: 'kubernetes-nodes'
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      insecure_skip_verify: true
    authorization:
      credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - source_labels: [__meta_kubernetes_node_name]
        target_label: node
      - target_label: job
        replacement: kubelet
      - target_label: metrics_path
        replacement: /metrics

  - job_name: 'kubernetes-cadvisor'
    scheme: https
    metrics_path: /metrics/cadvisor
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      insecure_skip_verify: true
    authorization:
      credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - source_labels: [__meta_kubernetes_node_name]
        target_label: node
      - target_label: job
        replacement: kubelet
      - target_label: metrics_path
        replacement: /metrics/cadvisor

remote_write:
  - url: 'http://192.168.1.99:9090/api/v1/write'
